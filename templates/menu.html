<body>
    <header class="nevbar"> 
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo"height="200px" width="200px">
        <div>
            <input type="text" id="searchInput" placeholder="Search you want ......" class="search">
        </div>
        <ul class="menu">
            <li><a href="{{ url_for('home') }}">Home</a></li>

                <form action="/add_to_cart" method="POST">
                    <input type="hidden" name="item" value="Espresso">

            <div class="price">₹250</div>
