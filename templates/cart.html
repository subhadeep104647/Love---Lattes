<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Funnel+Display:wght@300..800&family=Gravitas+One&family=Playwrite+CU+Guides&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Funnel+Display:wght@300..800&family=Gravitas+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playwrite+CU+Guides&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='cart.css') }}">
</head>
<body>
    <header class="nevbar"> 
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo"height="200px" width="200px">
        <div>
            <input type="text" id="searchInput" placeholder="Search you want ......" class="search">
        </div>
        <ul class="menu">
            <li class="l"><a href="{{ url_for('home') }}">Home</a></li>
            <li class="l"><a href="{{ url_for('menu') }}">Menu</a></li>
            <li class="l"><a href="/cart" class="active">Cart</a></li>
            <li class="l"><a href="{{ url_for('about') }}">About</a></li>

        </ul>

        <a href="{{ url_for('profile') }}" class="contact-btn">Profile</a>
    </header>

    <h1>Your Cart 🛒</h1>

{% if cart %}

<ul class="ul">

{% for item in cart %}

<li class="li">
{{ item.item }} - ₹{{ item.price }}

<a href="/remove/{{ loop.index0 }}">
<button>Remove</button>
</a>

</li>

{% endfor %}

</ul>

<h2>Total: ₹{{ total }}</h2>

<a href="/order">
<button>Order Now</button>
</a>

{% else %}

<p>Your cart is empty</p>

{% endif %}

</body>

<footer>
    <img src="{{ url_for('static', filename='images/footer.png') }}"alt="footer" class="footer1" width="1500px">
</footer>

</html>
